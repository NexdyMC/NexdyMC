name: Generate Snake Blue Dark

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    name: generate-snake-game
    steps:
      - uses: actions/checkout@v3
      
      - uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          # Bagian ini sudah di-kustomisasi agar berwarna gelap kebiruan yang estetik
          outputs: |
            dist/github-snake-dark.svg?color_snake=#4b70f5&color_dots=#1a1953,#162e93,#2f2fe4,#3dc2ec,#8fcfec
            
      - name: Push GitHub Snake ke Output Branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
